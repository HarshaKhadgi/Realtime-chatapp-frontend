# ============================================With DevSecOps===================================================

name: CI / CD — React Vite Frontend → DevSecOps → ECR → GitOps (ArgoCD)

on:
  push:
    branches: ["master"]

  pull_request:
    branches: ["master"]

  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  FRONTEND_REPO: fareshare-frontend

  IMAGE_TAG: ${{ github.sha }}-${{ github.run_number }}

permissions:
  id-token: write
  contents: write
  security-events: write
  actions: read
  pull-requests: write
  issues: write

jobs:

  # =========================================================
  # CHECKOUT + NODE SETUP
  # =========================================================
  setup:
    name: Checkout & Setup
    runs-on: ubuntu-latest

    outputs:
      commit_sha: ${{ steps.vars.outputs.sha }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # - name: Install Dependencies
      #   run: npm ci

      - name: Save Commit SHA
        id: vars
        run: echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT

  # =========================================================
  # REACT BUILD VALIDATION
  # =========================================================
  build:
    name: React Build Validation
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # - name: Install Dependencies
      #   run: npm ci

      # - name: Run ESLint
      #   run: npm run lint

      - name: Run Production Build
        run: npm run build

  # =========================================================
  # SONARQUBE STATIC CODE ANALYSIS
  # =========================================================
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # =========================================================
  # OWASP DEPENDENCY CHECK
  # =========================================================
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "fareshare-frontend"
          path: "."
          format: "HTML"
          out: "reports"

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports

  # =========================================================
  # TRIVY FILESYSTEM SCAN
  # =========================================================
  trivy-filesystem:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"

  # =========================================================
  # AWS LOGIN + ECR AUTH
  # =========================================================
  docker-build-push:
    name: Build Docker Image & Push to ECR
    runs-on: ubuntu-latest

    needs:
      - sonarqube
      - owasp-dependency-check
      - trivy-filesystem

    outputs:
      image_uri: ${{ steps.image.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      # AWS OIDC Authentication
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Docker Build
      - name: Build Docker Image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }}

          echo "Building image: $IMAGE_URI"

          docker build -t $IMAGE_URI .

      # =====================================================
      # TRIVY IMAGE SCAN
      # =====================================================
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      # Push Image
      - name: Push Docker Image to ECR
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }}

          docker push $IMAGE_URI

      - name: Save Image URI
        id: image
        run: |
          echo "image=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

  # =========================================================
  # UPDATE KUBERNETES MANIFESTS (GITOPS)
  # =========================================================
  update-manifests:
    name: Update Kubernetes Manifest
    runs-on: ubuntu-latest

    needs: docker-build-push

    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Deployment YAML
        run: |
          IMAGE_URI=${{ needs.docker-build-push.outputs.image_uri }}

          echo "Updating deployment with image:"
          echo "$IMAGE_URI"

          sed -i "s|image: .*|image: $IMAGE_URI|g" k8s/deployment.yaml

      - name: Commit Updated Manifest
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add k8s/deployment.yaml

          git commit -m "Update frontend image to ${{ env.IMAGE_TAG }}" || exit 0

          git push

  # =========================================================
  # ARGOCD SYNC
  # =========================================================
  notify-argocd:
    name: Trigger ArgoCD Sync
    runs-on: ubuntu-latest

    needs: update-manifests

    if: github.ref == 'refs/heads/master'

    steps:
      - name: Sync ArgoCD Application
        run: |
          curl -k -X POST \
            -u ${{ secrets.ARGOCD_USERNAME }}:${{ secrets.ARGOCD_PASSWORD }} \
            https://${{ secrets.ARGOCD_HOST }}/api/v1/applications/${{ secrets.ARGOCD_APP_NAME }}/sync

  # =========================================================
  # CLEANUP
  # =========================================================
  cleanup:
    name: Cleanup Old Docker Images
    runs-on: ubuntu-latest

    needs:
      - docker-build-push
      - update-manifests

    if: always()

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cleanup Old ECR Images
        run: |

          REPO=${{ env.FRONTEND_REPO }}

          TOTAL_IMAGES=$(aws ecr list-images \
            --repository-name $REPO \
            --query 'length(imageIds)' \
            --output text)

          echo "Total Images: $TOTAL_IMAGES"

          if [ "$TOTAL_IMAGES" -gt 5 ]; then

            echo "Deleting old images..."

            aws ecr describe-images \
              --repository-name $REPO \
              --query 'sort_by(imageDetails,&imagePushedAt)[:-5].imageDigest' \
              --output text | tr '\t' '\n' | while read digest; do

                if [ ! -z "$digest" ]; then

                  aws ecr batch-delete-image \
                    --repository-name $REPO \
                    --image-ids imageDigest=$digest

                fi

              done

          else
            echo "Less than 5 images available. Skipping cleanup."
          fi

      - name: Cleanup Local Docker Cache
        run: |
          docker system prune -af
          docker image prune -af